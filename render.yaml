services:
  - type: web
    name: maranatha
    env: node
    plan: free
    buildCommand: >
      pnpm install &&
      BASE_PATH=/ PORT=10000 pnpm --filter @workspace/maranatha run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: >
      NODE_ENV=production node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: maranatha-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: maranatha-db
    plan: free
    databaseName: maranatha
