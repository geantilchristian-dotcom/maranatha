services:
  - type: web
    name: maranatha
    env: node
    plan: free
    buildCommand: >
      npm install -g pnpm &&
      pnpm install --no-frozen-lockfile &&
      BASE_PATH=/ pnpm --filter @workspace/maranatha run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: NODE_ENV=production node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
