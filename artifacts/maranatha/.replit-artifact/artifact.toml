kind = "web"
previewPath = "/"
title = "Maranatha"
version = "1.0.0"
id = "artifacts/maranatha"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20038

[services.development]
run = "pnpm --filter @workspace/maranatha run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/maranatha", "run", "build" ]
publicDir = "artifacts/maranatha/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20038"
BASE_PATH = "/"
